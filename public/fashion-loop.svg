<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8e3a3"/>
      <stop offset="45%" stop-color="#d8b25c"/>
      <stop offset="100%" stop-color="#9c7833"/>
    </linearGradient>
    <linearGradient id="goldSoft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e9cd84"/>
      <stop offset="100%" stop-color="#a07f3c"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8e3a3" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fff4d0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f8e3a3" stop-opacity="0"/>
    </linearGradient>

    <style>
      .float   { animation: float 7s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: center; }
      .float2  { animation: float 9s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: center; }
      .float3  { animation: float 6s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: center; }
      .sway    { animation: sway 8s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: top center; }
      .sway2   { animation: sway 10s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: top center; }
      .breathe { animation: breathe 5s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: center; }
      .tw      { animation: twinkle 4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .wave    { animation: drift 16s ease-in-out infinite alternate; }
      .wave2   { animation: drift2 20s ease-in-out infinite alternate; }
      .glow    { animation: glow 6s ease-in-out infinite alternate; }
      .swp     { animation: sweep 9s ease-in-out infinite; }

      @keyframes float   { from { transform: translateY(14px); } to { transform: translateY(-14px); } }
      @keyframes sway    { from { transform: rotate(-6deg); }   to { transform: rotate(6deg); } }
      @keyframes breathe { from { transform: scale(0.94); }     to { transform: scale(1.06); } }
      @keyframes twinkle { 0%,100% { opacity: 0.15; transform: scale(0.7); } 50% { opacity: 1; transform: scale(1.15); } }
      @keyframes drift   { from { transform: translateX(-40px); } to { transform: translateX(40px); } }
      @keyframes drift2  { from { transform: translateX(50px); }  to { transform: translateX(-50px); } }
      @keyframes glow    { from { opacity: 0.2; } to { opacity: 0.6; } }
      @keyframes sweep   { 0% { transform: translateX(-700px); } 60%,100% { transform: translateX(2200px); } }

      .tw.d1 { animation-delay: 0s; } .tw.d2 { animation-delay: .6s; }
      .tw.d3 { animation-delay: 1.2s; } .tw.d4 { animation-delay: 1.8s; }
      .tw.d5 { animation-delay: 2.4s; } .tw.d6 { animation-delay: 3s; }
      .tw.d7 { animation-delay: 3.6s; } .tw.d8 { animation-delay: .9s; }
      .tw.d9 { animation-delay: 2.1s; } .tw.d10 { animation-delay: 1.5s; }
    </style>
  </defs>

  <!-- transparent background, no border -->

  <!-- flowing fabric waves -->
  <g opacity="0.5">
    <path class="wave glow" d="M-200,760 C300,640 620,900 980,760 C1340,620 1640,880 2120,720"
          fill="none" stroke="url(#goldSoft)" stroke-width="2"/>
    <path class="wave2 glow" d="M-200,300 C260,200 560,420 980,300 C1400,180 1700,420 2120,300"
          fill="none" stroke="url(#goldSoft)" stroke-width="1.5" opacity="0.6"/>
    <path class="wave" d="M-200,860 C300,760 700,980 1060,840 C1420,700 1720,960 2120,820"
          fill="none" stroke="url(#goldSoft)" stroke-width="1" opacity="0.45"/>
  </g>

  <!-- moving shimmer band -->
  <g class="swp">
    <rect x="0" y="0" width="260" height="1080" fill="url(#shimmer)" transform="skewX(-18)" opacity="0.6"/>
  </g>

  <!-- ================= FASHION ICONS ================= -->
  <g fill="none" stroke="url(#gold)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">

    <!-- Hanger -->
    <g transform="translate(250,250)">
      <g class="sway">
        <path d="M50,14 q14,-12 14,4 q0,9 -12,12"/>
        <path d="M52,30 L6,70 Q2,74 8,76 L96,76 Q102,74 98,70 L52,30 Z"/>
      </g>
    </g>

    <!-- A-line Dress -->
    <g transform="translate(330,520)">
      <g class="sway2">
        <path d="M30,10 C36,22 56,22 62,10 L86,40 L70,58 L96,150 L-4,150 L22,58 L6,40 Z"/>
        <path d="M30,10 L46,30 L62,10" stroke-width="2"/>
      </g>
    </g>

    <!-- High-heel shoe -->
    <g transform="translate(300,820)">
      <g class="float">
        <path d="M4,24 C34,18 78,34 120,30 C130,29 130,42 118,46 L46,72 C26,80 6,74 4,52 Z"/>
        <path d="M104,46 L112,108 L100,108 L100,48"/>
      </g>
    </g>

    <!-- Sunglasses -->
    <g transform="translate(880,210)">
      <g class="float2">
        <ellipse cx="26" cy="26" rx="26" ry="22"/>
        <ellipse cx="104" cy="26" rx="26" ry="22"/>
        <path d="M52,18 Q65,8 78,18"/>
        <path d="M0,20 L-22,8"/>
        <path d="M130,20 L152,8"/>
      </g>
    </g>

    <!-- Handbag -->
    <g transform="translate(900,470)">
      <g class="float3">
        <path d="M14,30 L86,30 L96,96 L4,96 Z"/>
        <path d="M30,30 C30,2 70,2 70,30"/>
        <path d="M4,52 L96,52" stroke-width="2"/>
      </g>
    </g>

    <!-- Necklace / pearl strand -->
    <g transform="translate(820,760)">
      <g class="sway">
        <path d="M10,10 Q130,150 250,10"/>
        <circle cx="70" cy="73" r="7" fill="url(#goldSoft)" stroke="none"/>
        <circle cx="110" cy="100" r="8" fill="url(#goldSoft)" stroke="none"/>
        <circle cx="150" cy="108" r="9" fill="url(#goldSoft)" stroke="none"/>
        <circle cx="190" cy="100" r="8" fill="url(#goldSoft)" stroke="none"/>
        <circle cx="230" cy="73" r="7" fill="url(#goldSoft)" stroke="none"/>
      </g>
    </g>

    <!-- Perfume bottle -->
    <g transform="translate(1430,230)">
      <g class="float">
        <path d="M12,34 L52,34 L52,84 Q52,92 44,92 L20,92 Q12,92 12,84 Z"/>
        <rect x="24" y="22" width="16" height="12"/>
        <rect x="22" y="6" width="20" height="16"/>
        <path d="M32,44 L32,72 M22,58 L42,58" stroke-width="1.6" opacity="0.7"/>
      </g>
    </g>

    <!-- Ring with diamond -->
    <g transform="translate(1480,520)">
      <g class="breathe">
        <circle cx="40" cy="58" r="34"/>
        <path d="M16,20 L64,20 L52,2 L28,2 Z"/>
        <path d="M16,20 L40,44 L64,20 M28,2 L40,44 M52,2 L40,44" stroke-width="1.8"/>
      </g>
    </g>

    <!-- Stiletto outline -->
    <g transform="translate(1420,800)">
      <g class="float2">
        <path d="M120,24 C90,18 46,34 4,30 C-6,29 -6,42 6,46 L78,72 C98,80 118,74 120,52 Z"/>
        <path d="M20,46 L12,108 L24,108 L24,48"/>
      </g>
    </g>

    <!-- Lipstick -->
    <g transform="translate(620,330)">
      <g class="float3">
        <rect x="10" y="34" width="34" height="44" rx="3"/>
        <path d="M14,34 L14,16 Q14,4 27,4 Q40,4 40,16 L40,34"/>
        <path d="M10,52 L44,52" stroke-width="2"/>
      </g>
    </g>

    <!-- Bow tie / ribbon -->
    <g transform="translate(1180,330)">
      <g class="sway2">
        <path d="M40,30 L4,8 L4,52 Z"/>
        <path d="M40,30 L76,8 L76,52 Z"/>
        <circle cx="40" cy="30" r="9"/>
      </g>
    </g>

  </g>

  <!-- ================= SPARKLES ================= -->
  <g fill="url(#gold)">
    <g class="tw d1" transform="translate(180,420)"><path d="M0,-14 Q2,-2 14,0 Q2,2 0,14 Q-2,2 -14,0 Q-2,-2 0,-14 Z"/></g>
    <g class="tw d2" transform="translate(560,180)"><path d="M0,-10 Q1.4,-1.4 10,0 Q1.4,1.4 0,10 Q-1.4,1.4 -10,0 Q-1.4,-1.4 0,-10 Z"/></g>
    <g class="tw d3" transform="translate(760,640)"><path d="M0,-16 Q2.2,-2.2 16,0 Q2.2,2.2 0,16 Q-2.2,2.2 -16,0 Q-2.2,-2.2 0,-16 Z"/></g>
    <g class="tw d4" transform="translate(1080,180)"><path d="M0,-11 Q1.5,-1.5 11,0 Q1.5,1.5 0,11 Q-1.5,1.5 -11,0 Q-1.5,-1.5 0,-11 Z"/></g>
    <g class="tw d5" transform="translate(1320,560)"><path d="M0,-13 Q1.8,-1.8 13,0 Q1.8,1.8 0,13 Q-1.8,1.8 -13,0 Q-1.8,-1.8 0,-13 Z"/></g>
    <g class="tw d6" transform="translate(1680,420)"><path d="M0,-15 Q2,-2 15,0 Q2,2 0,15 Q-2,2 -15,0 Q-2,-2 0,-15 Z"/></g>
    <g class="tw d7" transform="translate(1740,720)"><path d="M0,-10 Q1.4,-1.4 10,0 Q1.4,1.4 0,10 Q-1.4,1.4 -10,0 Q-1.4,-1.4 0,-10 Z"/></g>
    <g class="tw d8" transform="translate(460,780)"><path d="M0,-12 Q1.7,-1.7 12,0 Q1.7,1.7 0,12 Q-1.7,1.7 -12,0 Q-1.7,-1.7 0,-12 Z"/></g>
    <g class="tw d9" transform="translate(1180,820)"><path d="M0,-14 Q2,-2 14,0 Q2,2 0,14 Q-2,2 -14,0 Q-2,-2 0,-14 Z"/></g>
    <g class="tw d10" transform="translate(960,360)"><path d="M0,-9 Q1.3,-1.3 9,0 Q1.3,1.3 0,9 Q-1.3,1.3 -9,0 Q-1.3,-1.3 0,-9 Z"/></g>
  </g>
</svg>
